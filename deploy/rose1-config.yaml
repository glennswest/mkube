# mkube configuration for rose1.gw.lo (ROSE Data Server)
# This file is mounted at /etc/mkube/config.yaml inside the container.
#
# The container runs ON the router at 192.168.200.2 and accesses the
# RouterOS REST API at 192.168.200.1 (the bridge gateway).

nodeName: rose1
standalone: true

routeros:
  address: "192.168.200.1:8728"
  restUrl: "http://192.168.200.1/rest"
  user: mkube
  password: "mkube-rest"
  useTLS: false

# Statically configured networks. Discovery will auto-populate DNS config
# for any of these that lack it, and add new networks found on the device.
networks:
  - name: gt
    bridge: bridge-gt
    cidr: "192.168.200.0/24"
    gateway: "192.168.200.1"
    dns:
      endpoint: "http://192.168.200.199:8080"
      zone: "gt.lo"
      server: "192.168.200.199"
      staticRecords:
        - name: rose1
          ip: "192.168.200.1"
        - name: dns
          ip: "192.168.200.199"
        - name: nats
          ip: "192.168.200.10"
        - name: mkube
          ip: "192.168.200.2"
        - name: registry
          ip: "192.168.200.3"
  - name: g8
    type: data
    bridge: bridge-g8
    cidr: "192.168.8.0/24"
    gateway: "192.168.8.1"
    dns:
      endpoint: "http://192.168.8.252:8080"
      zone: "g8.lo"
      server: "192.168.8.252"
      staticRecords:
        - name: rose1
          ip: "192.168.8.1"
        - name: dns
          ip: "192.168.8.252"
      dhcp:
        enabled: true
        rangeStart: "192.168.8.100"
        rangeEnd: "192.168.8.200"
        leaseTime: 86400
  - name: g9
    type: data
    bridge: bridge-g9
    cidr: "192.168.9.0/24"
    gateway: "192.168.9.1"
    dns:
      endpoint: "http://192.168.9.252:8080"
      zone: "g9.lo"
      server: "192.168.9.252"
      staticRecords:
        - name: rose1
          ip: "192.168.9.1"
        - name: dns
          ip: "192.168.9.252"
      dhcp:
        enabled: true
        rangeStart: "192.168.9.100"
        rangeEnd: "192.168.9.200"
        leaseTime: 86400
  - name: g10
    bridge: bridge-g10
    cidr: "192.168.10.0/24"
    gateway: "192.168.10.1"
    ipamStart: "192.168.10.200"
    ipamEnd: "192.168.10.250"
    dns:
      endpoint: "http://192.168.10.252:8080"
      zone: "g10.lo"
      server: "192.168.10.252"
      staticRecords:
        - name: rose1
          ip: "192.168.10.1"
        - name: dns
          ip: "192.168.10.252"
        - name: pxe
          ip: "192.168.10.200"
      dhcp:
        enabled: true
        rangeStart: "192.168.10.100"
        rangeEnd: "192.168.10.199"
        leaseTime: 600
        nextServer: "192.168.10.200"
        bootFile: "undionly.kpxe"
        bootFileEfi: "ipxe.efi"
        # Reservations managed via BMH objects in NATS + microdns REST API
  - name: g11
    type: ipmi
    bridge: bridge-g11
    cidr: "192.168.11.0/24"
    gateway: "192.168.11.1"
    ipamStart: "192.168.11.200"
    ipamEnd: "192.168.11.250"
    dns:
      endpoint: "http://192.168.11.252:8080"
      zone: "g11.lo"
      server: "192.168.11.252"
      staticRecords:
        - name: rose1
          ip: "192.168.11.1"
        - name: dns
          ip: "192.168.11.252"
      dhcp:
        enabled: true
        rangeStart: "192.168.11.150"
        rangeEnd: "192.168.11.180"
        leaseTime: 600
        nextServer: "192.168.10.9"
        bootFile: "pxelinux.0"
        # Reservations managed via BMH objects in NATS + microdns REST API
  - name: gw
    bridge: bridge-lan
    cidr: "192.168.1.0/24"
    gateway: "192.168.1.88"
    externalDNS: true  # DNS server runs on pvex.gw.lo (CT 117), not managed by mkube
    dns:
      endpoint: "http://192.168.1.52:8080"
      zone: "gw.lo"
      server: "192.168.1.52"
      staticRecords:
        - name: rose1
          ip: "192.168.1.88"
        - name: dns
          ip: "192.168.1.52"

storage:
  basePath: /raid1/images
  tarballCache: /raid1/cache
  selfRootDir: raid1/images/kube.gt.lo
  persistentMounts:
    - containerPath: "/raid1/cache"
      hostPath: "raid1/cache"
    - containerPath: "/raid1/iso"
      hostPath: "raid1/iso"
    - containerPath: "/data"
      hostPath: "raid1/volumes/kube.gt.lo/data"
  gcIntervalMinutes: 60
  gcKeepLastN: 10
  gcDryRun: false

lifecycle:
  bootManifestPath: /etc/mkube/boot-order.yaml
  watchdogIntervalSeconds: 5
  maxRestarts: 5
  restartCooldown: 10

dzo:
  enabled: true
  listenAddr: ":8082"
  statePath: /etc/mkube/dzo-state.yaml
  microdnsImage: "192.168.200.3:5000/microdns:latest"
  defaultMode: "nested"

namespace:
  statePath: /etc/mkube/namespace-state.yaml
  defaultMode: "nested"

logging:
  enabled: true
  url: "http://logging.kube.gt.lo:8084"

nats:
  embedded: true
  storeDir: /data/nats
  port: 4222
  replicas: 1

cluster:
  enabled: true
  peers:
    - name: pvex
      address: "http://192.168.1.160:8082"

bmh:
  pxeManagerURL: "http://pxe.g10.lo:8080"
  dhcpLeaseURL: "http://192.168.11.252:8080"
  watchInterval: 30

# Registry runs as a standalone container (mkube-registry) at 192.168.200.3:5000.
# mkube no longer runs the embedded registry — it receives push notifications
# via the webhook endpoint POST /api/v1/registry/push-notify.
registry:
  enabled: false
  localAddresses:
    - "192.168.200.3:5000"
    - "192.168.200.2:5000"  # legacy alias — rewritten to primary
    - "registry.gt.lo:5000"  # DNS alias — rewritten to primary

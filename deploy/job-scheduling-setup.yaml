---
# Job Scheduling Setup for server1
#
# Usage:
#   mk apply -f deploy/job-scheduling-setup.yaml
#
# This creates:
#   1. BootConfig "coreos-agent" — ignition with mkube-agent systemd service
#   2. JobRunner "build-runner"  — pool="build", powers off after 5min idle
#   3. HostReservation "server1" — reserves server1 for the "build" pool
#
# Then submit jobs:
#   mk apply -f - <<EOF
#   apiVersion: v1
#   kind: Job
#   metadata:
#     name: my-build
#     namespace: default
#   spec:
#     pool: build
#     priority: 10
#     script: |
#       echo "Hello from $(hostname)"
#       uname -a
#       date
#     timeout: 600
#   EOF
#
# Monitor:
#   mk get jr          # runner status
#   mk get hres        # host reservations
#   mk get job         # job status
#   mk get jq          # pending queue
#   mk logs job/my-build -n default   # or: curl $API/api/v1/namespaces/default/jobs/my-build/logs
#
apiVersion: v1
kind: BootConfig
metadata:
  name: coreos-agent
spec:
  format: ignition
  description: CoreOS with mkube-agent for job execution
  data:
    config.ign: |
      {
        "ignition": {"version": "3.4.0"},
        "storage": {
          "directories": [{"path": "/data", "mode": 493}],
          "files": [
            {
              "path": "/usr/local/bin/mkube-agent",
              "mode": 493,
              "contents": {
                "source": "http://192.168.200.2:8082/api/v1/bootconfigs/coreos-agent/files/mkube-agent"
              }
            },
            {
              "path": "/etc/mkube-agent.env",
              "mode": 420,
              "contents": {
                "inline": "MKUBE_API=http://192.168.200.2:8082"
              }
            }
          ]
        },
        "systemd": {
          "units": [
            {
              "name": "mkube-agent.service",
              "enabled": true,
              "contents": "[Unit]\nDescription=mkube job agent\nAfter=network-online.target\nWants=network-online.target\n\n[Service]\nType=oneshot\nRemainAfterExit=yes\nEnvironmentFile=/etc/mkube-agent.env\nExecStart=/usr/local/bin/mkube-agent\nWorkingDirectory=/data\nStandardOutput=journal\nStandardError=journal\n\n[Install]\nWantedBy=multi-user.target\n"
            }
          ]
        }
      }
---
apiVersion: v1
kind: JobRunner
metadata:
  name: build-runner
spec:
  pool: build
  bootConfigRef: coreos-agent
  idleTimeout: 300
  reclaimPolicy: PowerOff
  maxConcurrent: 1
---
apiVersion: v1
kind: HostReservation
metadata:
  name: server1
  namespace: default
spec:
  bmhRef: server1
  pool: build
  owner: ci
  purpose: Build and test jobs on server1

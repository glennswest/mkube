---
# Job Scheduling Setup for server1
#
# Usage:
#   mk apply -f deploy/job-scheduling-setup.yaml
#
# This creates:
#   1. JobRunner "build-runner"    — pool="build", maxConcurrent=10, powers off after 5min idle
#   2. HostReservation "server1"   — reserves server1 for the "build" pool
#
# The bootconfig "coreos-agent" is assigned to build pool servers.
# It runs mkube-agent as a container: registry.gt.lo:5000/mkube-agent:edge
# Agent supports parallel job execution (MKUBE_MAX_CONCURRENT env, default 4).
#
# Submit build-container jobs:
#   mk apply -f - <<EOF
#   apiVersion: v1
#   kind: Job
#   metadata:
#     name: kernel-build
#     namespace: default
#   spec:
#     pool: build
#     priority: 10
#     repo: https://github.com/glennswest/kernel-build
#     buildScript: build.sh
#     buildImage: registry.gt.lo:5000/rawhidedev:latest
#     timeout: 10800
#   EOF
#
# Monitor:
#   mk get jr          # runner status
#   mk get hres        # host reservations
#   mk get job         # job status
#   mk get jq          # pending queue
#   mk logs job/kernel-build -n default
#
apiVersion: v1
kind: JobRunner
metadata:
  name: build-runner
spec:
  pool: build
  template: fcos/agent-runner
  idleTimeout: 300
  reclaimPolicy: PowerOff
  maxConcurrent: 10
---
apiVersion: v1
kind: HostReservation
metadata:
  name: server1
  namespace: default
spec:
  bmhRef: server1
  pool: build
  owner: ci
  purpose: Build and test jobs on server1

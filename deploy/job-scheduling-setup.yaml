---
# Job Scheduling Setup for server1
#
# Usage:
#   mk apply -f deploy/job-scheduling-setup.yaml
#
# This creates:
#   1. JobRunner "build-runner"    — pool="build", uses cloudid template, powers off after 5min idle
#   2. HostReservation "server1"   — reserves server1 for the "build" pool
#
# The ignition template "fcos/agent-runner" is managed in cloudid's template store.
# It runs mkube-agent as a container: registry.gt.lo:5000/mkube-agent:edge
#
# Then submit jobs:
#   mk apply -f - <<EOF
#   apiVersion: v1
#   kind: Job
#   metadata:
#     name: my-build
#     namespace: default
#   spec:
#     pool: build
#     priority: 10
#     script: |
#       echo "Hello from $(hostname)"
#       uname -a
#       date
#     timeout: 600
#   EOF
#
# Monitor:
#   mk get jr          # runner status
#   mk get hres        # host reservations
#   mk get job         # job status
#   mk get jq          # pending queue
#   mk logs job/my-build -n default   # or: curl $API/api/v1/namespaces/default/jobs/my-build/logs
#
apiVersion: v1
kind: JobRunner
metadata:
  name: build-runner
spec:
  pool: build
  template: fcos/agent-runner
  idleTimeout: 300
  reclaimPolicy: PowerOff
  maxConcurrent: 1
---
apiVersion: v1
kind: HostReservation
metadata:
  name: server1
  namespace: default
spec:
  bmhRef: server1
  pool: build
  owner: ci
  purpose: Build and test jobs on server1

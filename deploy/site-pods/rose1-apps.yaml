# Site-specific pods for rose1
# Apply via: mk apply -f deploy/site-pods/rose1-apps.yaml

---
apiVersion: v1
kind: Pod
metadata:
  name: bmh-operator
  namespace: infra
  annotations:
    vkube.io/network: gt
    vkube.io/image-policy: auto
spec:
  restartPolicy: Always
  containers:
    - name: bmh-operator
      image: registry.gt.lo:5000/bmh-operator:edge
      ports:
        - containerPort: 80
      volumeMounts:
        - name: config
          mountPath: /etc/bmh-operator
        - name: data
          mountPath: /data
  volumes:
    - name: config
      configMap:
        name: bmh-operator-config

---
apiVersion: v1
kind: Pod
metadata:
  name: ipmiserial
  namespace: infra
  annotations:
    vkube.io/network: g10
    vkube.io/image-policy: auto
spec:
  restartPolicy: Always
  containers:
    - name: ipmiserial
      image: registry.gt.lo:5000/ipmiserial:edge
      livenessProbe:
        httpGet:
          path: /
          port: 80
        periodSeconds: 30
        failureThreshold: 3
      volumeMounts:
        - name: data
          mountPath: /var/lib/data

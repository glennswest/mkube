# Site-specific pods for rose1
# Apply via: kubectl --server=http://rose1.gw.lo:8082 apply -f rose1-apps.yaml

---
apiVersion: v1
kind: Pod
metadata:
  name: ipmiserial
  namespace: infra
  annotations:
    vkube.io/network: g10
    vkube.io/image-policy: auto
spec:
  restartPolicy: Always
  containers:
    - name: ipmiserial
      image: registry.gt.lo:5000/ipmiserial:edge
      livenessProbe:
        httpGet:
          path: /
          port: 80
        periodSeconds: 30
        failureThreshold: 3
      volumeMounts:
        - name: data
          mountPath: /var/lib/data
